name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      # Build core BEFORE typecheck — the meta-package's tsconfig.test.json
      # imports from "effect-vue" which re-exports from "@effect-vue/core"
      # whose types live in dist/. Without an upfront build the dist/ doesn't
      # exist on a clean CI checkout and the meta-package's dogfood typecheck
      # fails to resolve the re-exports.
      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - name: Verify published-tarball invariants (INV-10)
        run: pnpm verify:tarballs

      - name: Typecheck examples/basic (dogfood gate)
        run: pnpm --filter '@effect-vue/example-basic' exec vue-tsc --noEmit

      - name: Build examples/basic
        run: pnpm --filter '@effect-vue/example-basic' build
