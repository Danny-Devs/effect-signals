name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: Verify published-tarball invariants (INV-10)
        run: pnpm verify:tarballs

      - name: Typecheck examples/basic (dogfood gate)
        run: pnpm --filter '@effect-vue/example-basic' exec vue-tsc --noEmit

      - name: Build examples/basic
        run: pnpm --filter '@effect-vue/example-basic' build
